<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Content Director</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- 1. 변수 및 초기화 --- */
        :root {
            --bg-color: #fffafb;
            --text-main: #111111;
            --text-sub: #666666;
            --point-color: #ff8a9d; /* 브랜드의 따뜻한 핑크 포인트 */
            --card-bg: #ffffff;
            --border-color: #eee0e2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            letter-spacing: -0.5px;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- 2. 헤더 / 내비게이션 --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background-color: rgba(255, 250, 251, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        header .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        header nav a {
            margin-left: 2.5rem;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s;
        }
        header nav a:hover { color: var(--point-color); }

        /* --- 3. 히어로 섹션 (첫인상) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero .tag {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--point-color);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 1.5rem;
        }

        .hero h1 span {
            color: var(--point-color);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-sub);
            max-width: 600px;
            font-weight: 300;
            line-height: 1.8;
        }

        /* --- 4. 공통 섹션 스타일 --- */
        section {
            padding: 6rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sec-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }

        .sec-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 4px;
            background-color: var(--point-color);
        }

        /* --- 5. 숏폼 비디오 섹션 (릴스 그리드) --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(255, 138, 157, 0.15);
        }

        .video-thumb {
            width: 100%;
            height: 480px; /* 숏폼 이미지 비율 최적화 */
            background-color: #e2d5d7;
            position: relative;
            overflow: hidden;
        }

        /* 💡 평소에 업로드한 이미지가 100% 꽉 차게 잘 보이도록 설정 */
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 💡 마우스를 올렸을 때만 어두워지면서 재생 버튼이 뜨도록 투명도(opacity) 제어 */
        .video-overlay {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 어두운 레이어 효과 */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* 평소에는 완전히 투명하게 숨김 */
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        /* 마우스를 올렸을 때(Hover)만 오버레이가 보이게 처리 */
        .video-card:hover .video-overlay { 
            opacity: 1; 
        }
        
        .video-overlay i { 
            color: #ffffff; 
            font-size: 3.5rem; 
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .video-info { padding: 1.5rem; }
        .video-info h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #222; }
        .video-info p { font-size: 0.95rem; color: var(--text-sub); line-height: 1.5; }

        /* --- 6. 굿즈 브랜딩 섹션 (mo.png, chi.png) --- */
        .design-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .design-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .design-img {
            width: 100%;
            height: 380px;
            background-color: #e2d5d7;
            overflow: hidden;
        }

            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0
